<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Task Manager — add, view and complete your tasks" />
  <title>Task Manager</title>
  <style>
    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #6366f1;
      --primary-dark: #4f46e5;
      --primary-light:#e0e7ff;
      --success:      #10b981;
      --success-light:#d1fae5;
      --danger:       #ef4444;
      --danger-light: #fee2e2;
      --text:         #1e1b4b;
      --text-2:       #6b7280;
      --border:       #e5e7eb;
      --bg:           #f5f3ff;
      --surface:      #ffffff;
      --radius:       12px;
      --shadow:       0 4px 20px rgba(99,102,241,.13);
      --trans:        0.18s ease;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      line-height: 1.6;
    }

    /* ── Page header ───────────────────────────────── */
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .page-header .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px; height: 52px;
      background: var(--primary);
      border-radius: 14px;
      margin-bottom: .85rem;
      box-shadow: 0 4px 14px rgba(99,102,241,.35);
    }

    .page-header .logo svg { width: 28px; height: 28px; }

    .page-header h1 {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.5px;
    }

    .page-header p {
      color: var(--text-2);
      font-size: .95rem;
      margin-top: .25rem;
    }

    /* ── Card ──────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 640px;
      margin: 0 auto 1.5rem;
      overflow: hidden;
      border: 1.5px solid var(--border);
    }

    .card-header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: .65rem;
    }

    .card-header h2 {
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
    }

    .card-header svg { width: 20px; height: 20px; color: rgba(255,255,255,.85); }

    .card-body { padding: 1.5rem; }

    /* ── Form ──────────────────────────────────────── */
    .form-row {
      display: flex;
      gap: .75rem;
      align-items: flex-start;
    }

    .input-wrap { flex: 1; }

    .input-wrap label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: .4rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .input-wrap input {
      width: 100%;
      padding: .7rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      color: var(--text);
      background: var(--bg);
      transition: border-color var(--trans), box-shadow var(--trans);
      font-family: inherit;
    }

    .input-wrap input:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .input-wrap input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px var(--danger-light);
    }

    .field-error {
      font-size: .78rem;
      color: var(--danger);
      margin-top: .3rem;
      min-height: 1.1em;
      display: block;
      font-weight: 500;
    }

    /* ── Submit button ─────────────────────────────── */
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .7rem 1.3rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--trans);
      white-space: nowrap;
      margin-top: 1.45rem;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(99,102,241,.35);
    }

    .btn-add:hover  { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }
    .btn-add svg    { width: 17px; height: 17px; }

    /* ── Stats strip ───────────────────────────────── */
    .stats {
      display: flex;
      gap: .75rem;
      margin-bottom: 1.25rem;
    }

    .stat {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: .75rem 1rem;
      text-align: center;
    }

    .stat-value {
      display: block;
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1;
      color: var(--primary);
    }

    .stat.done-stat .stat-value { color: var(--success); }

    .stat-label {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-2);
      font-weight: 600;
      margin-top: .25rem;
      display: block;
    }

    /* ── Filter tabs ───────────────────────────────── */
    .filter-tabs {
      display: flex;
      gap: .4rem;
      margin-bottom: 1rem;
      background: var(--bg);
      border-radius: 8px;
      padding: 4px;
      border: 1.5px solid var(--border);
    }

    .filter-tab {
      flex: 1;
      padding: .45rem .6rem;
      border: none;
      background: none;
      border-radius: 6px;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: var(--trans);
      font-family: inherit;
    }

    .filter-tab.active {
      background: var(--surface);
      color: var(--primary);
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }

    /* ── Task list ─────────────────────────────────── */
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }

    /* ── Task item ─────────────────────────────────── */
    .task-item {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .9rem 1rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      transition: box-shadow var(--trans), border-color var(--trans), opacity var(--trans);
      animation: slide-in .2s ease;
    }

    @keyframes slide-in {
      from { transform: translateY(-8px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .task-item:hover { box-shadow: 0 2px 12px rgba(99,102,241,.1); border-color: #c7d2fe; }

    /* Completed state */
    .task-item.completed {
      background: #fafafa;
      border-color: #e5e7eb;
      opacity: .72;
    }

    .task-item.completed:hover { opacity: .9; }

    /* Custom checkbox */
    .task-check {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--trans);
      background: var(--surface);
    }

    .task-item:not(.completed) .task-check:hover {
      border-color: var(--success);
      background: var(--success-light);
    }

    .task-item.completed .task-check {
      background: var(--success);
      border-color: var(--success);
    }

    .task-check svg { width: 11px; height: 11px; opacity: 0; transition: var(--trans); }
    .task-item.completed .task-check svg { opacity: 1; }

    /* ── Task text ─────────────────────────────────── */
    .task-text-wrap { flex: 1; min-width: 0; }

    .task-text {
      font-size: .95rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
      transition: var(--trans);
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--text-2);
    }

    .task-date {
      font-size: .73rem;
      color: var(--text-2);
      margin-top: .15rem;
    }

    /* ── Task actions ──────────────────────────────── */
    .task-actions { display: flex; gap: .4rem; flex-shrink: 0; }

    .btn-complete {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .38rem .75rem;
      border: 1.5px solid var(--success);
      background: var(--success-light);
      color: #065f46;
      border-radius: 6px;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--trans);
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-complete:hover { background: var(--success); color: #fff; }
    .btn-complete svg   { width: 13px; height: 13px; }

    .btn-undo {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .38rem .75rem;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text-2);
      border-radius: 6px;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--trans);
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-undo:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .btn-undo svg   { width: 13px; height: 13px; }

    .btn-delete {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text-2);
      border-radius: 6px;
      cursor: pointer;
      transition: var(--trans);
      font-family: inherit;
      flex-shrink: 0;
    }

    .btn-delete:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }
    .btn-delete svg   { width: 14px; height: 14px; }

    /* ── Empty state ───────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-2);
    }

    .empty-state svg   { width: 52px; height: 52px; margin: 0 auto .85rem; opacity: .35; }
    .empty-state h3    { font-size: 1rem; font-weight: 700; margin-bottom: .3rem; color: var(--text); }
    .empty-state p     { font-size: .85rem; }

    /* ── Toast ─────────────────────────────────────── */
    .toast-wrap {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 999;
      display: flex;
      flex-direction: column-reverse;
      gap: .5rem;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .7rem 1rem;
      border-radius: 10px;
      font-size: .875rem;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
      animation: pop-in .22s ease;
      min-width: 220px;
    }

    @keyframes pop-in {
      from { transform: translateX(60px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    .toast.success { background: #065f46; }
    .toast.info    { background: var(--primary); }
    .toast.warning { background: #92400e; }
    .toast svg     { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 520px) {
      .form-row    { flex-direction: column; }
      .btn-add     { width: 100%; justify-content: center; margin-top: 0; }
      .stats       { gap: .5rem; }
      .stat-value  { font-size: 1.3rem; }
      .task-item   { flex-wrap: wrap; }
      .task-actions { width: 100%; justify-content: flex-end; }
    }

    /* ── Focus visible ─────────────────────────────── */
    :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 4px; }

  </style>
</head>

<body>

  <!-- ── Page header ─────────────────────────────── -->
  <header class="page-header" role="banner">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
    </div>
    <h1>Task Manager</h1>
    <p>Add tasks, mark them done, stay on track.</p>
  </header>

  <!-- ── Add task card ───────────────────────────── -->
  <section class="card" aria-label="Add new task">
    <div class="card-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <h2>Add a New Task</h2>
    </div>
    <div class="card-body">
      <form id="task-form" novalidate aria-label="New task form">
        <div class="form-row">
          <div class="input-wrap">
            <label for="task-input">Task title</label>
            <input
              type="text"
              id="task-input"
              name="task"
              placeholder="e.g. Review design mockups…"
              autocomplete="off"
              maxlength="120"
              aria-describedby="task-input-err"
              aria-required="true"
            />
            <span class="field-error" id="task-input-err" role="alert" aria-live="polite"></span>
          </div>
          <button type="submit" class="btn-add" id="submit-btn" aria-label="Add task">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Task
          </button>
        </div>
      </form>
    </div>
  </section>

  <!-- ── Task list card ──────────────────────────── -->
  <section class="card" aria-label="Task list">
    <div class="card-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <h2>All Tasks</h2>
    </div>
    <div class="card-body">

      <!-- Stats -->
      <div class="stats" aria-label="Task statistics">
        <div class="stat">
          <span class="stat-value" id="stat-total" aria-label="total tasks">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-pending" style="color:#f59e0b" aria-label="pending tasks">0</span>
          <span class="stat-label">Pending</span>
        </div>
        <div class="stat done-stat">
          <span class="stat-value" id="stat-done" aria-label="completed tasks">0</span>
          <span class="stat-label">Done</span>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs" role="tablist" aria-label="Filter tasks">
        <button class="filter-tab active" role="tab" aria-selected="true"  data-filter="all"       id="tab-all">All</button>
        <button class="filter-tab"        role="tab" aria-selected="false" data-filter="pending"   id="tab-pending">Pending</button>
        <button class="filter-tab"        role="tab" aria-selected="false" data-filter="completed" id="tab-completed">Completed</button>
      </div>

      <!-- List -->
      <ul class="task-list" id="task-list" role="list" aria-label="Task items" aria-live="polite"></ul>

    </div>
  </section>

  <!-- Toast container -->
  <div class="toast-wrap" id="toast-wrap" aria-live="polite" aria-atomic="true"></div>

</body>

<script>
'use strict';

/* ══════════════════════════════════════════════
   STATE — persisted to localStorage
══════════════════════════════════════════════ */
const STORAGE_KEY = 'tm_tasks_v1';

/** @type {{ id: number, text: string, completed: boolean, createdAt: string }[]} */
let tasks = [];
let activeFilter = 'all';

function loadTasks() {
  try {
    tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    if (!Array.isArray(tasks)) tasks = [];
  } catch {
    tasks = [];
  }
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

/* ══════════════════════════════════════════════
   VALIDATION
══════════════════════════════════════════════ */
function validateInput(raw) {
  const value = raw.trim();

  if (value === '') {
    return { ok: false, msg: 'Task title cannot be empty.' };
  }
  if (value.length < 3) {
    return { ok: false, msg: 'Task title must be at least 3 characters.' };
  }
  if (value.length > 120) {
    return { ok: false, msg: 'Task title must be 120 characters or fewer.' };
  }
  // No HTML / script injection
  if (/<[^>]+>/.test(value)) {
    return { ok: false, msg: 'Task title must not contain HTML tags.' };
  }
  // Duplicate check (case-insensitive, pending tasks only)
  const dup = tasks.find(t => !t.completed && t.text.toLowerCase() === value.toLowerCase());
  if (dup) {
    return { ok: false, msg: 'A pending task with this name already exists.' };
  }

  return { ok: true, value };
}

function showError(msg) {
  const el = document.getElementById('task-input-err');
  const input = document.getElementById('task-input');
  el.textContent = msg;
  input.classList.add('error');
  input.setAttribute('aria-invalid', 'true');
}

function clearError() {
  const el = document.getElementById('task-input-err');
  const input = document.getElementById('task-input');
  el.textContent = '';
  input.classList.remove('error');
  input.removeAttribute('aria-invalid');
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
const ICONS = {
  success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`,
  info:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  warning: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
};

function toast(message, type = 'success') {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className = `toast ${type}`;
  el.setAttribute('role', 'status');
  el.innerHTML = `${ICONS[type] || ICONS.info}<span>${escHtml(message)}</span>`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB', {
    day: 'numeric', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function nextId() {
  return tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
}

/* ══════════════════════════════════════════════
   CORE ACTIONS
══════════════════════════════════════════════ */
function addTask(text) {
  tasks.unshift({
    id:        nextId(),
    text:      text.trim(),
    completed: false,
    createdAt: new Date().toISOString(),
  });
  saveTasks();
}

function toggleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (task) {
    task.completed = !task.completed;
    saveTasks();
  }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
}
</script>

<script>
'use strict';  // second script block — render + events

/* ══════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */
function filteredTasks() {
  if (activeFilter === 'pending')   return tasks.filter(t => !t.completed);
  if (activeFilter === 'completed') return tasks.filter(t =>  t.completed);
  return tasks;
}

function renderStats() {
  const total   = tasks.length;
  const done    = tasks.filter(t => t.completed).length;
  const pending = total - done;

  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-done').textContent    = done;
}

function renderList() {
  const list = document.getElementById('task-list');
  const visible = filteredTasks();

  if (visible.length === 0) {
    const messages = {
      all:       ['No tasks yet', 'Add your first task above to get started.'],
      pending:   ['All caught up!', 'No pending tasks right now.'],
      completed: ['Nothing done yet', 'Mark tasks complete to see them here.'],
    };
    const [h, p] = messages[activeFilter];
    list.innerHTML = `
      <li class="empty-state" role="status" aria-label="${h}">
        <svg viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        <h3>${escHtml(h)}</h3>
        <p>${escHtml(p)}</p>
      </li>`;
    return;
  }

  list.innerHTML = visible.map(task => `
    <li class="task-item${task.completed ? ' completed' : ''}"
        data-id="${task.id}"
        role="listitem"
        aria-label="${escHtml(task.text)}, ${task.completed ? 'completed' : 'pending'}">

      <!-- Circle check -->
      <button class="task-check"
              onclick="handleToggle(${task.id})"
              aria-label="${task.completed ? 'Mark as pending' : 'Mark as completed'}: ${escHtml(task.text)}"
              title="${task.completed ? 'Undo' : 'Mark complete'}">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>

      <!-- Text -->
      <div class="task-text-wrap">
        <span class="task-text">${escHtml(task.text)}</span>
        <div class="task-date" aria-label="Added on ${formatDate(task.createdAt)}">
          Added ${formatDate(task.createdAt)}
        </div>
      </div>

      <!-- Actions -->
      <div class="task-actions">
        ${!task.completed
          ? `<button class="btn-complete" onclick="handleToggle(${task.id})" aria-label="Mark as completed: ${escHtml(task.text)}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Mark as Completed
            </button>`
          : `<button class="btn-undo" onclick="handleToggle(${task.id})" aria-label="Mark as pending: ${escHtml(task.text)}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.21"/>
              </svg>
              Undo
            </button>`
        }
        <button class="btn-delete" onclick="handleDelete(${task.id})" aria-label="Delete task: ${escHtml(task.text)}" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
        </button>
      </div>
    </li>`).join('');
}

function render() {
  renderStats();
  renderList();
}

/* ══════════════════════════════════════════════
   HANDLERS
══════════════════════════════════════════════ */
function handleToggle(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  toggleTask(id);
  toast(
    task.completed ? `"${task.text}" marked as pending.` : `"${task.text}" completed! 🎉`,
    task.completed ? 'info' : 'success'
  );
  render();
}

function handleDelete(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  if (!confirm(`Delete "${task.text}"?\nThis cannot be undone.`)) return;
  deleteTask(id);
  toast(`"${task.text}" deleted.`, 'warning');
  render();
}

/* ── Form submit ─────────────────────────────── */
document.getElementById('task-form').addEventListener('submit', function(e) {
  e.preventDefault();
  clearError();

  const input = document.getElementById('task-input');
  const result = validateInput(input.value);

  if (!result.ok) {
    showError(result.msg);
    input.focus();
    return;
  }

  addTask(result.value);
  toast(`"${result.value}" added!`, 'success');
  input.value = '';
  input.focus();

  // Switch to All tab so new task is visible
  setFilter('all');
  render();
});

/* ── Live validation as user types ──────────── */
document.getElementById('task-input').addEventListener('input', function() {
  if (this.value.trim() !== '') clearError();
});

/* ── Filter tabs ─────────────────────────────── */
function setFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(btn => {
    const isActive = btn.dataset.filter === filter;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });
}

document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    setFilter(btn.dataset.filter);
    render();
  });
});

/* ── Keyboard shortcut: Enter focuses input ─── */
document.addEventListener('keydown', function(e) {
  if (e.key === 'n' && !e.ctrlKey && !e.metaKey &&
      document.activeElement.tagName !== 'INPUT' &&
      document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    document.getElementById('task-input').focus();
  }
});

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
loadTasks();
render();
</script>
</html>
