services:
  - type: web
    name: taskflow-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: FIREBASE_PROJECT_ID
        sync: false          # Set in Render dashboard
      - key: FIREBASE_CLIENT_EMAIL
        sync: false          # Set in Render dashboard
      - key: FIREBASE_PRIVATE_KEY
        sync: false          # Set in Render dashboard (the full RSA private key)
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_EXPIRY
        value: "3600"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false          # Set to your Vercel frontend URL after deploying
